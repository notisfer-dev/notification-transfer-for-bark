  <text x="765" y="468" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">GCM / noPadding</text>

  <path d="M535 330C610 330 620 330 690 330" stroke="#FF6B4A" stroke-width="10" stroke-linecap="round"/>
