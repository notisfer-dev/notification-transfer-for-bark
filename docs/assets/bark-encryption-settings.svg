  <rect x="735" y="310" width="290" height="58" rx="16" fill="#111827" stroke="#25324A"/>
  <text x="765" y="348" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">AES256</text>

  <text x="735" y="410" fill="#C8D2E3" font-family="Arial, sans-serif" font-size="28">Mode / Padding</text>
