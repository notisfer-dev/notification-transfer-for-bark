  <text x="145" y="345" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">https://api.day.app/&lt;device-key&gt;</text>

  <rect x="110" y="405" width="420" height="98" rx="22" fill="#1C2433" stroke="#2C3B53"/>
  <text x="145" y="448" fill="#C9D3E6" font-family="Arial, sans-serif" font-size="22">Key</text>
  <text x="145" y="483" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">32 chars, same on both apps</text>

  <rect x="110" y="528" width="420" height="98" rx="22" fill="#1C2433" stroke="#2C3B53"/>
  <text x="145" y="571" fill="#C9D3E6" font-family="Arial, sans-serif" font-size="22">IV</text>
  <text x="145" y="606" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">12 chars, fixed value</text>

  <rect x="690" y="165" width="380" height="320" rx="30" fill="#05070B" stroke="#2F4FFC" stroke-width="3"/>
  <text x="735" y="235" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="46" font-weight="700">Encryption Settings</text>
